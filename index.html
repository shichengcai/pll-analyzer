<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLL 开环分析工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f4f8;
            padding: 20px;
            color: #1a202c;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #edf2f7;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 20px;
        }
        .grid-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .field {
            display: flex;
            flex-direction: column;
        }
        .field label {
            font-size: 13px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 4px;
        }
        .field input {
            padding: 8px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            background: #f7fafc;
            width: 100%;
        }
        .field input:focus {
            outline: none;
            border-color: #4299e1;
            background: white;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn:hover {
            background: #3182ce;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .result-item {
            background: #f7fafc;
            padding: 12px 16px;
            border-radius: 10px;
        }
        .result-item .label {
            font-size: 12px;
            color: #718096;
        }
        .result-item .value {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-top: 2px;
        }
        .plot-container {
            margin-top: 12px;
            text-align: center;
            background: #f7fafc;
            border-radius: 10px;
            padding: 8px;
        }
        .plot-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .status {
            text-align: center;
            font-size: 14px;
            color: #718096;
            margin-top: 12px;
        }
        .status.error {
            color: #e53e3e;
        }
        .status.success {
            color: #38a169;
        }
        .poles-text {
            white-space: pre-wrap;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px 12px;
            }
            .grid-3 {
                grid-template-columns: 1fr 1fr;
            }
            .result-grid {
                grid-template-columns: 1fr 1fr;
            }
            .card {
                padding: 16px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 PLL 开环分析工具</h1>
    <!-- 电路图显示区域 -->
    <div class="card">
        <div class="card-title">环路滤波器结构</div>
        <div style="text-align: center; padding: 10px 0;">
            <img src="circuit.png" alt="环路滤波器结构" style="max-width: 100%; height: auto; max-height: 150px;">
        </div>
    </div>
    <div class="card">
        <div class="card-title">环路参数</div>
        <div class="grid">
            <div class="field"><label>Ip (mA)</label><input id="ip" value="15" type="number" step="0.1"></div>
            <div class="field"><label>Kvco (MHz/V)</label><input id="kvco" value="187.2" type="number" step="0.1"></div>
            <div class="field"><label>N</label><input id="n" value="140" type="number" step="1"></div>
            <div class="field"><label>C1 (nF)</label><input id="c1" value="0.56" type="number" step="0.01"></div>
            <div class="field"><label>C2 (nF)</label><input id="c2" value="330" type="number" step="0.01"></div>
            <div class="field"><label>C3 (nF)</label><input id="c3" value="1.57" type="number" step="0.01"></div>
            <div class="field"><label>C4 (nF)</label><input id="c4" value="0" type="number" step="0.01"></div>
            <div class="field"><label>R2 (Ω)</label><input id="r2" value="47" type="number" step="1"></div>
            <div class="field"><label>R3 (Ω)</label><input id="r3" value="15" type="number" step="1"></div>
            <div class="field"><label>R4 (Ω)</label><input id="r4" value="0" type="number" step="1"></div>
        </div>
        <button class="btn" id="calcBtn">🚀 计算</button>
        <div class="status" id="status">就绪</div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
        <div class="card-title">计算结果</div>
        <div class="result-grid">
            <div class="result-item"><div class="label">环路带宽(kHz)</div><div class="value" id="bandwidth">---</div></div>
            <div class="result-item"><div class="label">相位裕量(°)</div><div class="value" id="phaseMargin">---</div></div>
            <div class="result-item"><div class="label">零点(kHz)</div><div class="value" id="zeros">---</div></div>
            <div class="result-item"><div class="label">极点(MHz)</div><div class="value poles-text" id="poles">---</div></div>
        </div>
        <div class="plot-container" id="plotContainer">
            <img id="plotImage" src="" alt="波特图">
        </div>
    </div>
	
	<div style="text-align: center; margin-top: 20px; padding: 12px 0; color: #a0aec0; font-size: 12px; border-top: 1px solid #edf2f7;">
        作者：石成才
    </div>
</div>

<script>
    const status = document.getElementById('status');
    const btn = document.getElementById('calcBtn');
    const resultCard = document.getElementById('resultCard');

    function getVal(id) { return parseFloat(document.getElementById(id).value) || 0; }

    async function calculate() {
        const params = {
            Ip_mA: getVal('ip'),
            Kvco_MHz: getVal('kvco'),
            N: getVal('n'),
            C1_nF: getVal('c1'),
            C2_nF: getVal('c2'),
            C3_nF: getVal('c3'),
            C4_nF: getVal('c4'),
            R2: getVal('r2'),
            R3: getVal('r3'),
            R4: getVal('r4')
        };

        btn.disabled = true;
        status.textContent = '⏳ 计算中...';
        status.className = 'status';

        try {
            const resp = await fetch('https://pll-analyzer-production.up.railway.app/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
            const data = await resp.json();

            if (data.success) {
                const d = data.data;
                document.getElementById('bandwidth').textContent = d.bandwidth;
                document.getElementById('phaseMargin').textContent = d.phase_margin;
                document.getElementById('zeros').textContent = d.zeros_text;
                document.getElementById('poles').textContent = d.poles_text || '无';
                document.getElementById('plotImage').src = 'data:image/png;base64,' + d.plot_image;
                resultCard.style.display = 'block';
                status.textContent = '✅ 计算完成';
                status.className = 'status success';
            } else {
                status.textContent = '❌ 错误: ' + data.error;
                status.className = 'status error';
            }
        } catch (e) {
            status.textContent = '❌ 网络错误: ' + e.message;
            status.className = 'status error';
        }
        btn.disabled = false;
    }

    document.getElementById('calcBtn').addEventListener('click', calculate);

    // Enter 键触发计算
    document.querySelectorAll('input').forEach(el => {
        el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
    });
</script>
</body>
</html>
